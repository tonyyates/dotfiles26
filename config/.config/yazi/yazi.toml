# =============================================================================
# ~/.config/yazi/yazi.toml
# =============================================================================

[manager]
ratio          = [1, 2, 4]   # sidebar:parent:preview ratio
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true

[preview]
max_width  = 1000
max_height = 1000

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]
open = [
  { run = 'open "$@"', for = "macos" },
]
reveal = [
  { run = 'open -R "$@"', for = "macos" },
]

[open]
rules = [
  # Text/code → nvim
  { mime = "text/*", use = "edit" },
  { mime = "application/json", use = "edit" },
  # Everything else → system open
  { mime = "*", use = "open" },
]
