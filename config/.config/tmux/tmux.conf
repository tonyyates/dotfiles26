# =============================================================================
# ~/.config/tmux/tmux.conf — Omakase-inspired tmux config
# Prefix: Ctrl-a (more ergonomic than Ctrl-b)
# =============================================================================

# ── Core settings ────────────────────────────────────────────────────────────
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # True color
set -ag terminal-overrides ",alacritty:RGB"
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g focus-events on
set -g mouse on
set -sg escape-time 0            # No delay for escape key (vital for nvim)
set -g base-index 1              # Windows start at 1 (not 0)
set -g pane-base-index 1         # Panes start at 1 too
set -g renumber-windows on       # Renumber when a window is closed

# ── Prefix: Ctrl-a ───────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ── Intuitive splits (open in current path) ───────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Vim-style pane navigation (works with vim-tmux-navigator) ────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Also allow Ctrl+hjkl without prefix (via plugin below)
bind -n C-h run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
bind -n C-j run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
bind -n C-k run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
bind -n C-l run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

# ── Resize panes ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Window navigation ─────────────────────────────────────────────────────────
bind -n M-h previous-window      # Alt+h → previous window
bind -n M-l next-window          # Alt+l → next window
bind Tab last-window             # prefix + Tab → last window

# ── Copy mode: vim keys ───────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
# macOS clipboard integration
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Status bar — Tokyo Night inspired ────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"

# Left: session name
set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] 󱎫 #S #[bg=#1a1b26,fg=#7aa2f7]"

# Right: user, host, date/time
set -g status-right-length 80
set -g status-right "#[fg=#414868]#[bg=#414868,fg=#c0caf5] %a %d %b #[fg=#7aa2f7,bg=#414868]#[bg=#7aa2f7,fg=#1a1b26,bold] %H:%M "

# Windows
set -g window-status-format " #[fg=#565f89]#I #W "
set -g window-status-current-format "#[bg=#414868,fg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Message bar
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#414868,fg=#c0caf5"

# ── TPM Plugins ──────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # persist sessions across restarts
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto save/restore
set -g @plugin 'tmux-plugins/tmux-yank'         # better yank
set -g @plugin 'christoomey/vim-tmux-navigator' # seamless vim/tmux navigation
set -g @plugin 'fcsonline/tmux-thumbs'          # hint-mode copy (like vimium)
set -g @plugin 'sainnhe/tmux-fzf'               # fzf integration

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'
set -g @thumbs-command 'echo -n {} | pbcopy'

# ── Initialize TPM (keep this at the very bottom) ────────────────────────────
run '~/.tmux/plugins/tpm/tpm'
